# Coding Enigma: Exercise 01

---

# Agenda

1. What do we want to send?
2. What restrictions do we have?
3. Python functions
4. Preparing a message
5. Testing your code
6. Committing your code

---

# What do we want to send?

We want to send a *message* using Enigma. This can be any arbitrary
text. To start with we will want to send a short simple message "Hello
world".

---

# Restrictions

The Enigma keyboard has 26 keys to enter a message - the 26 uppercase
characters of the latin alphabet.

Before we pass the message into Enigma, we must transform it to comply.

We will write a function that:

* Remove all spaces

* Upper cases all letters

* Remove the punctuation characters `.` `,` `?` and `!`

The result is the *plaintext* which will be encoded.

---

# Python functions

Python functions start with the text `def` followed by the function name.

```python
def add(left, right):
    return left + right

def subtract(left, right):
    return left - right
```

Round brackets, `(` and `)`, surround a comma separated list of
function arguments. You can have as many arguments as you like.

The function name and each argument is a python identifier.

The line ends with a semi-colon, `:`, after which the behaviour of the
function is described. The behaviour description must be indented
relative to the `def`, and ends at the next line with the same
indentation as the `def` line.

A function can return a value to its caller with the `return` keyword.
A function does not have to return a value.

What do you think the above functions do?

This function will take arbitrary strings as input. We want it to
return plaintext that only contains `A`-`Z`.

Use pythons string functions to modify the text:

* `text.upper()` will return `text` with all letter upper cased.

# Committing Your Code

When you have `prepare()` working, create a commit recording what
you've done.

```bash
git add src/enigma.py
git commit
```

The add command is used to stage the changes, collecting changes from
multiple files into a single commit. We only need to add one file.

The commit command creates a new commit.

You will need to describe the changes in a commit message.

After every exercise, commit your new code and any tests that you have
added.
