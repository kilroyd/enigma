# Rotor

On the outside of the rotor, each letter is printed in sequence. When
placed in the machine, a single letter for each rotor is visible
through a window. This defines the position of the rotor.

Since the rotor is a cylinder, once we reach the letter 'Z' the next
letter will be 'A'.

```
             <--
           Z  A   
      X Y        B C
    W                 D
    V                 E
  U                     F
  T                     G
  S                     H
    R                 I
    Q                 J
      P O        L K
           N  M
          -->
```
---

# Exercise

Write a function to return the letter we will be on after rotating N
positions.

Implement a test before you start implementing the function.

---

# Next

When your test is passing, commit the changes.
